<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>user ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #f8e8f0 0%, #fdf0f5 40%, #f0e8f5 70%, #f8e8f0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    position: relative;
    padding: 16px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e91e8c' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .poster {
    position: relative;
    width: 100%;
    max-width: 520px;
    min-height: 700px;
    background: linear-gradient(160deg, #fff0f7 0%, #fde8f2 50%, #f5e8ff 100%);
    border-radius: 24px;
    box-shadow: 0 30px 80px rgba(233, 30, 140, 0.15), 0 0 0 1px rgba(233,30,140,0.08);
    padding: clamp(16px, 4vw, 30px);
    overflow: hidden;
    z-index: 1;
  }

  /* Watermark */
  .watermark {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(9px, 2vw, 11px);
    color: #aaa;
    letter-spacing: 1px;
    z-index: 10;
    white-space: nowrap;
  }

  /* Butterfly sticker top-left */
  .sticker-butterfly {
    position: absolute;
    top: 30px;
    left: clamp(8px, 3vw, 20px);
    z-index: 20;
    animation: flutter 3s ease-in-out infinite;
  }
  .sticker-butterfly svg { width: clamp(45px, 12vw, 70px); }
  @keyframes flutter {
    0%,100% { transform: rotate(-5deg) scale(1); }
    50% { transform: rotate(5deg) scale(1.08); }
  }

  .sticker-butterflies-text {
    position: absolute;
    top: clamp(75px, 18vw, 95px);
    left: clamp(4px, 2vw, 14px);
    font-family: 'Dancing Script', cursive;
    font-size: clamp(11px, 2.8vw, 15px);
    color: #c2185b;
    z-index: 20;
    line-height: 1.3;
    text-align: center;
    width: clamp(80px, 22vw, 120px);
  }

  /* I love you sticker top-right */
  .sticker-iloveyou {
    position: absolute;
    top: clamp(55px, 13vw, 70px);
    right: clamp(8px, 3vw, 16px);
    background: white;
    border-radius: 50px;
    padding: clamp(5px, 1.5vw, 8px) clamp(10px, 3vw, 18px);
    font-family: 'Dancing Script', cursive;
    font-size: clamp(15px, 4vw, 22px);
    color: #c2185b;
    box-shadow: 0 4px 16px rgba(194,24,91,0.18);
    z-index: 20;
    animation: pulse 2s ease-in-out infinite;
    cursor: pointer;
    transition: transform 0.3s;
  }
  .sticker-iloveyou:hover { transform: scale(1.15) rotate(-3deg); }
  @keyframes pulse { 0%,100%{box-shadow:0 4px 16px rgba(194,24,91,0.18);} 50%{box-shadow:0 8px 28px rgba(194,24,91,0.35);} }

  /* Main hero image */
  .hero-img {
    position: absolute;
    left: -10px;
    top: 50px;
    width: clamp(160px, 48vw, 280px);
    z-index: 5;
    transition: transform 0.4s ease, filter 0.4s ease;
    cursor: pointer;
    filter: drop-shadow(4px 0 20px rgba(233,30,140,0.2));
  }
  .hero-img:hover {
    transform: scale(1.04) translateX(6px);
    filter: drop-shadow(8px 0 30px rgba(233,30,140,0.4));
  }
  .hero-img img {
    width: 100%;
    border-radius: 0 120px 120px 0;
    display: block;
  }
  .hero-img .placeholder {
    width: 100%;
    height: clamp(280px, 65vw, 480px);
    border-radius: 0 120px 120px 0;
    background: linear-gradient(135deg, #f48fb1, #e91e8c, #880e4f);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: clamp(10px, 2.5vw, 13px);
    text-align: center;
    padding: 20px;
  }

  /* Circle collage */
  .circle-collage {
    position: absolute;
    right: clamp(6px, 2vw, 10px);
    top: clamp(100px, 25vw, 120px);
    width: clamp(130px, 40vw, 240px);
    height: clamp(190px, 58vw, 340px);
    border-radius: 50%;
    overflow: hidden;
    z-index: 4;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
  }

  .collage-cell {
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: transform 0.4s ease;
  }
  .collage-cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(233, 30, 140, 0);
    transition: background 0.3s;
  }
  .collage-cell:hover::after { background: rgba(233,30,140,0.2); }
  .collage-cell:hover { transform: scale(1.06); z-index: 2; }

  .collage-cell .placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #bdbdbd, #757575);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: clamp(7px, 2vw, 10px);
    text-align: center;
    padding: 8px;
  }
  .collage-cell img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: filter 0.4s; }
  .collage-cell:hover img { filter: grayscale(0%); }

  /* Heartbeat sticker */
  .sticker-heartbeat {
    position: absolute;
    right: clamp(30px, 12vw, 60px);
    top: clamp(195px, 52vw, 285px);
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 4px;
    background: white;
    border-radius: 20px;
    padding: clamp(3px, 1vw, 5px) clamp(7px, 2vw, 12px);
    box-shadow: 0 4px 14px rgba(233,30,140,0.15);
  }
  .heartbeat-line { color: #e91e8c; font-size: clamp(12px, 3.5vw, 18px); }
  .heart-icon { color: #e91e8c; font-size: clamp(12px, 3.5vw, 18px); animation: heartBeat 1s ease infinite; }
  @keyframes heartBeat { 0%,100%{transform:scale(1);} 50%{transform:scale(1.3);} }

  /* Camera sticker */
  .sticker-camera {
    position: absolute;
    left: clamp(6px, 2vw, 14px);
    top: clamp(270px, 72vw, 370px);
    z-index: 20;
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s;
  }
  .sticker-camera:hover { transform: rotate(-10deg) scale(1.1); }
  .sticker-camera .cam-label {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(10px, 2.8vw, 14px);
    color: #880e4f;
    margin-top: 4px;
  }
  .sticker-camera svg { width: clamp(36px, 10vw, 55px); }

  /* Flower */
  .flower-sticker {
    position: absolute;
    left: clamp(110px, 36vw, 195px);
    top: clamp(240px, 62vw, 340px);
    z-index: 15;
    animation: sway 4s ease-in-out infinite;
    cursor: pointer;
    transition: transform 0.3s;
  }
  .flower-sticker:hover { transform: scale(1.2) rotate(20deg); }
  @keyframes sway { 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }
  .flower-sticker svg { width: clamp(45px, 13vw, 75px); }

  /* Bottom collage row */
  .bottom-collage {
    position: absolute;
    bottom: 90px;
    left: clamp(10px, 3vw, 20px);
    right: clamp(10px, 3vw, 20px);
    display: flex;
    gap: clamp(5px, 2vw, 10px);
    z-index: 6;
  }
  .bottom-cell {
    flex: 1;
    height: clamp(80px, 22vw, 130px);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transition: transform 0.4s ease, box-shadow 0.4s;
  }
  .bottom-cell:hover { transform: translateY(-6px) scale(1.04); box-shadow: 0 12px 30px rgba(233,30,140,0.25); }
  .bottom-cell .placeholder {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #bdbdbd, #616161);
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: clamp(7px, 2vw, 10px); text-align: center; padding: 8px;
  }
  .bottom-cell img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(90%); transition: filter 0.4s; }
  .bottom-cell:hover img { filter: grayscale(0%); }

  /* Forever sticker */
  .sticker-forever {
    position: absolute;
    right: clamp(6px, 2vw, 14px);
    top: clamp(330px, 88vw, 460px);
    z-index: 20;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(12px, 3.5vw, 18px);
    color: #c2185b;
    display: flex;
    align-items: center;
    gap: 4px;
    background: white;
    border-radius: 20px;
    padding: clamp(3px, 1vw, 4px) clamp(8px, 2.5vw, 12px);
    box-shadow: 0 4px 14px rgba(194,24,91,0.15);
  }

  /* Balloons */
  .balloons {
    position: absolute;
    bottom: 115px;
    right: clamp(20px, 10vw, 55px);
    z-index: 18;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
  .balloons svg { width: clamp(32px, 9vw, 50px); }

  /* Name */
  .name-title {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Dancing Script', cursive;
    font-size: clamp(36px, 11vw, 58px);
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 2px;
    white-space: nowrap;
    z-index: 10;
    text-shadow: 2px 2px 0px rgba(233,30,140,0.1);
    transition: letter-spacing 0.4s, color 0.4s;
    cursor: default;
  }
  .name-title:hover {
    letter-spacing: 6px;
    color: #c2185b;
  }

  /* Music control */
  .music-btn {
    position: absolute;
    bottom: 18px;
    right: 18px;
    width: clamp(32px, 8vw, 38px);
    height: clamp(32px, 8vw, 38px);
    background: white;
    border-radius: 50%;
    border: 2px solid #e91e8c;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(233,30,140,0.2);
    z-index: 30;
    transition: transform 0.3s, background 0.3s;
  }
  .music-btn:hover { transform: scale(1.15); background: #e91e8c; }
  .music-btn:hover svg path { fill: white; }
  .music-btn svg { width: clamp(14px, 4vw, 18px); }

  /* Floating hearts */
  .floating-hearts {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .fheart {
    position: absolute;
    bottom: -20px;
    font-size: 18px;
    animation: riseUp linear infinite;
    opacity: 0;
  }
  @keyframes riseUp {
    0% { bottom: -20px; opacity: 0.8; transform: translateX(0) scale(1); }
    100% { bottom: 110%; opacity: 0; transform: translateX(40px) scale(0.5); }
  }

  .collage-cell::before {
    content: '📸 Tap to add';
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 5;
  }
  .collage-cell:hover::before { opacity: 1; }
  .bottom-cell::before {
    content: '📸 Tap to add';
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 5;
  }
  .bottom-cell:hover::before { opacity: 1; }

  @media (max-width: 400px) {
    .poster { min-height: 580px; }
    .bottom-collage { bottom: 80px; }
  }
</style>
</head>
<body>

<div class="floating-hearts" id="heartsContainer"></div>

<div class="poster">
  <div class="watermark">Sai Official</div>

  <div class="sticker-butterfly">
    <svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="30" rx="28" ry="22" fill="#f48fb1" opacity="0.85"/>
      <ellipse cx="70" cy="30" rx="28" ry="22" fill="#e91e8c" opacity="0.85"/>
      <ellipse cx="35" cy="55" rx="18" ry="14" fill="#f06292" opacity="0.8"/>
      <ellipse cx="65" cy="55" rx="18" ry="14" fill="#ec407a" opacity="0.8"/>
      <line x1="50" y1="10" x2="50" y2="70" stroke="#880e4f" stroke-width="2.5"/>
      <path d="M44 12 Q50 0 56 12" stroke="#880e4f" stroke-width="1.5" fill="none"/>
      <circle cx="28" cy="26" r="5" fill="white" opacity="0.4"/>
      <circle cx="72" cy="26" r="5" fill="white" opacity="0.4"/>
    </svg>
  </div>
  <div class="sticker-butterflies-text">You still give me<br>🦋 <em>butterflies</em></div>

  <div class="sticker-iloveyou">i <span style="color:#e91e8c">♥</span> love you</div>

  <div class="hero-img" title="Tap to add main photo">
    <div class="placeholder">🌸 Tap to add<br>Main Photo</div>
  </div>

  <div class="circle-collage">
    <div class="collage-cell" style="grid-column:1;grid-row:1;"><div class="placeholder">Photo 1</div></div>
    <div class="collage-cell" style="grid-column:2;grid-row:1;"><div class="placeholder">Photo 2</div></div>
    <div class="collage-cell" style="grid-column:1;grid-row:2;"><div class="placeholder">Photo 3</div></div>
    <div class="collage-cell" style="grid-column:2;grid-row:2;"><div class="placeholder">Photo 4</div></div>
    <div class="collage-cell" style="grid-column:1/3;grid-row:3;"><div class="placeholder">Photo 5</div></div>
  </div>

  <div class="sticker-heartbeat">
    <span class="heartbeat-line">〰️</span>
    <span class="heart-icon">♥</span>
    <span class="heartbeat-line">〰️</span>
  </div>

  <div class="sticker-camera">
    <svg viewBox="0 0 80 65" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="5" y="18" width="70" height="42" rx="8" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="2"/>
      <rect x="20" y="10" width="40" height="12" rx="4" fill="#bdbdbd"/>
      <circle cx="40" cy="39" r="14" fill="white" stroke="#9e9e9e" stroke-width="2"/>
      <circle cx="40" cy="39" r="9" fill="#757575"/>
      <circle cx="40" cy="39" r="5" fill="#424242"/>
      <circle cx="37" cy="36" r="2" fill="white" opacity="0.6"/>
      <rect x="60" y="22" width="8" height="6" rx="2" fill="#ef9a9a"/>
    </svg>
    <div class="cam-label">Capture<br>the<br>moment</div>
  </div>

  <div class="flower-sticker">
    <svg viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="50" y1="55" x2="50" y2="108" stroke="#4caf50" stroke-width="3"/>
      <ellipse cx="50" cy="35" rx="14" ry="20" fill="#f8bbd0" opacity="0.9"/>
      <ellipse cx="50" cy="35" rx="14" ry="20" fill="#f8bbd0" opacity="0.9" transform="rotate(45 50 35)"/>
      <ellipse cx="50" cy="35" rx="14" ry="20" fill="#f8bbd0" opacity="0.9" transform="rotate(90 50 35)"/>
      <ellipse cx="50" cy="35" rx="14" ry="20" fill="#f8bbd0" opacity="0.9" transform="rotate(135 50 35)"/>
      <ellipse cx="50" cy="35" rx="14" ry="20" fill="#f48fb1" opacity="0.7" transform="rotate(22 50 35)"/>
      <ellipse cx="50" cy="35" rx="14" ry="20" fill="#f48fb1" opacity="0.7" transform="rotate(67 50 35)"/>
      <ellipse cx="50" cy="35" rx="14" ry="20" fill="#f48fb1" opacity="0.7" transform="rotate(112 50 35)"/>
      <ellipse cx="50" cy="35" rx="14" ry="20" fill="#f48fb1" opacity="0.7" transform="rotate(157 50 35)"/>
      <circle cx="50" cy="35" r="13" fill="#fff176"/>
      <circle cx="50" cy="35" r="8" fill="#fdd835"/>
    </svg>
  </div>

  <div class="bottom-collage">
    <div class="bottom-cell"><div class="placeholder">Photo 6</div></div>
    <div class="bottom-cell"><div class="placeholder">Photo 7</div></div>
    <div class="bottom-cell"><div class="placeholder">Photo 8</div></div>
  </div>

  <div class="sticker-forever">∞ forever ❤️</div>

  <div class="balloons">
    <svg viewBox="0 0 70 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="22" cy="28" rx="18" ry="22" fill="#e53935"/>
      <ellipse cx="48" cy="22" rx="18" ry="22" fill="#e53935"/>
      <ellipse cx="35" cy="36" rx="15" ry="19" fill="#f44336"/>
      <path d="M22 50 Q25 65 30 70" stroke="#b71c1c" stroke-width="1.5" fill="none"/>
      <path d="M48 44 Q45 60 40 70" stroke="#b71c1c" stroke-width="1.5" fill="none"/>
      <path d="M35 55 Q35 68 35 70" stroke="#b71c1c" stroke-width="1.5" fill="none"/>
      <path d="M30 70 Q35 75 40 70" stroke="#b71c1c" stroke-width="1.5" fill="none"/>
      <ellipse cx="17" cy="22" rx="5" ry="7" fill="white" opacity="0.35"/>
      <ellipse cx="43" cy="16" rx="5" ry="7" fill="white" opacity="0.35"/>
    </svg>
  </div>

  <div class="name-title">USER</div>

  <div class="music-btn" id="musicBtn" title="Toggle background music">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path id="musicIcon" fill="#e91e8c" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
    </svg>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
  const container = document.getElementById('heartsContainer');
  const hearts = ['❤️','🌸','💕','💗','🩷'];
  function createHeart() {
    const h = document.createElement('div');
    h.className = 'fheart';
    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.animationDuration = (4 + Math.random() * 4) + 's';
    h.style.animationDelay = (Math.random() * 2) + 's';
    h.style.fontSize = (12 + Math.random() * 14) + 'px';
    container.appendChild(h);
    setTimeout(() => h.remove(), 8000);
  }
  setInterval(createHeart, 800);

  const audio = document.getElementById('bgMusic');
  const btn = document.getElementById('musicBtn');
  let playing = false;
  btn.addEventListener('click', () => {
    if (playing) { audio.pause(); playing = false; btn.style.background = 'white'; }
    else { audio.play().catch(() => {}); playing = true; btn.style.background = '#fce4ec'; }
  });

  document.querySelectorAll('.collage-cell, .bottom-cell, .hero-img').forEach(cell => {
    cell.addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const placeholder = cell.querySelector('.placeholder');
        if (placeholder) placeholder.remove();
        let img = cell.querySelector('img');
        if (!img) { img = document.createElement('img'); cell.appendChild(img); }
        img.src = url;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;filter:grayscale(90%);transition:filter 0.4s;';
      };
      input.click();
    });
  });
</script>
</body>
</html>
